<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Insta 01 – Phones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    background: #020c1a;
    font-family: 'Montserrat', sans-serif;
    position: relative;
  }

  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% 65%, rgba(41,182,185,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 15% 80%, rgba(31,54,130,0.32) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(31,54,130,0.25) 0%, transparent 55%),
      linear-gradient(160deg, #06111f 0%, #020c1a 45%, #030f1e 100%);
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(41,182,185,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,182,185,0.04) 1px, transparent 1px);
    background-size: 54px 54px;
  }
  .bg-word {
    position: absolute; bottom: -60px; left: 50%;
    transform: translateX(-50%);
    font-size: 260px; font-weight: 900; letter-spacing: -8px;
    color: rgba(255,255,255,0.025); white-space: nowrap;
    user-select: none;
  }
  .glow { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; }
  .g1 { width:500px; height:350px; background:rgba(41,182,185,0.13); bottom:0; left:50%; transform:translateX(-50%); }
  .g2 { width:300px; height:300px; background:rgba(31,54,130,0.22); top:0; left:0; }
  .g3 { width:300px; height:300px; background:rgba(31,54,130,0.18); top:0; right:0; }

  /* ── HEADER ── */
  .header {
    position: absolute; top: 44px; left: 0; right: 0;
    text-align: center; z-index: 20;
  }
  .label {
    font-size: 11px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase; color: #29B6B9;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .label::before, .label::after {
    content: ''; width: 24px; height: 1px; background: #29B6B9;
  }

  .title {
    margin-top: 12px;
    font-size: 38px; font-weight: 900; color: #fff;
    line-height: 1.1; letter-spacing: -1px;
  }
  .title span { color: #29B6B9; }

  /* ── PHONES ── */
  .phones {
    position: absolute;
    top: 160px; left: 0; right: 0; bottom: 120px;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 0;
  }

  .phone {
    width: 210px; height: 455px;
    border-radius: 36px;
    background: #1a1a1a;
    border: 2.5px solid rgba(255,255,255,0.14);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 35px 80px rgba(0,0,0,0.6),
      0 0 50px rgba(41,182,185,0.1);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .phone::before {
    content: ''; position: absolute;
    top: 13px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 24px;
    background: #000; border-radius: 18px; z-index: 10;
  }
  .phone img { width:100%; height:100%; object-fit:cover; object-position:top; }
  .phone-ref {
    position:absolute; inset:0; border-radius:inherit;
    background:linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
    z-index:5;
  }
  .btn-r { position:absolute; right:-3px; top:110px; width:3px; height:48px; background:rgba(255,255,255,0.13); border-radius:2px; }
  .btn-l1 { position:absolute; left:-3px; top:95px; width:3px; height:28px; background:rgba(255,255,255,0.13); border-radius:2px; }
  .btn-l2 { position:absolute; left:-3px; top:133px; width:3px; height:56px; background:rgba(255,255,255,0.13); border-radius:2px; }

  .phone-left  { transform: rotate(-13deg) translateY(-15px) translateX(36px); opacity:0.85; filter:brightness(0.82); z-index:1; }
  .phone-center {
    width: 248px; height: 536px; border-radius: 42px;
    transform: translateY(-20px); z-index: 3;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 50px 100px rgba(0,0,0,0.8), 0 0 70px rgba(41,182,185,0.2);
  }
  .phone-center::before { width: 90px; height: 26px; }
  .phone-right { transform: rotate(13deg) translateY(-15px) translateX(-36px); opacity:0.85; filter:brightness(0.82); z-index:1; }

  /* ── FOOTER ── */
  .footer {
    position: absolute; bottom: 32px; left: 40px; right: 40px;
    display: flex; justify-content: space-between; align-items: center; z-index: 20;
  }
  .stats { display: flex; gap: 32px; }
  .stat .num { font-size: 22px; font-weight: 900; color: #29B6B9; display: block; }
  .stat .lbl { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .brand-tag { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.2); letter-spacing: 3px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="bg"></div><div class="bg-grid"></div>
  <div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>
  <div class="bg-word">PETIVA</div>

  <div class="header">
    <div class="label">Petiva · Centro Veterinário</div>
    <div class="title">Design Responsivo<br><span>para todos os dispositivos</span></div>
  </div>

  <div class="phones">
    <div class="phone phone-left">
      <img src="../petiva-screenshots/12-mobile-section2.png" alt="" />
      <div class="btn-r"></div><div class="btn-l1"></div><div class="btn-l2"></div>
      <div class="phone-ref"></div>
    </div>
    <div class="phone phone-center">
      <img src="../petiva-screenshots/10-mobile-hero.png" alt="" />
      <div class="btn-r"></div><div class="btn-l1"></div><div class="btn-l2"></div>
      <div class="phone-ref"></div>
    </div>
    <div class="phone phone-right">
      <img src="../petiva-screenshots/13-mobile-section3.png" alt="" />
      <div class="btn-r"></div><div class="btn-l1"></div><div class="btn-l2"></div>
      <div class="phone-ref"></div>
    </div>
  </div>

  <div class="footer">
    <div class="stats">
      <div class="stat"><span class="num">15</span><span class="lbl">Especialidades</span></div>
      <div class="stat"><span class="num">100%</span><span class="lbl">Responsivo</span></div>
      <div class="stat"><span class="num">React</span><span class="lbl">Framework</span></div>
    </div>
    <div class="brand-tag">@mazyos</div>
  </div>
</body>
</html>
